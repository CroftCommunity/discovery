<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 920" font-family="'IBM Plex Sans','Segoe UI',sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#16202b}
      .sub{font-size:13px;fill:#5b6472}
      .box{fill:#fff;stroke-width:1.6}
      .certain{stroke:#2f8f63}
      .certfill{fill:#eef7f1}
      .judge{stroke:#c08a2c}
      .judgefill{fill:#fbf3e3}
      .human{stroke:#7a5cc0}
      .humanfill{fill:#f1ecfa}
      .term{stroke:#46596b}
      .termfill{fill:#eef1f4}
      .bt{font-size:14px;font-weight:700;fill:#16202b}
      .bd{font-size:11.5px;fill:#3f4854}
      .lbl{font-size:11px;font-weight:700;fill:#6b7480}
      .flow{stroke:#9aa3b2;stroke-width:2;fill:none}
      .tag{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa3b2"/></marker>
  </defs>
  <rect width="1080" height="920" fill="#f7f8fa"/>
  <text x="44" y="46" class="title">Returning member: governance catch-up</text>
  <text x="44" y="68" class="sub">Green = certain (provenance, computed alone). Amber = per-scope threshold judgment. Purple = humans supply utility.</text>

  <!-- legend tags -->
  <rect x="44" y="86" width="150" height="22" rx="4" class="certfill" stroke="#2f8f63"/><text x="54" y="101" class="tag" fill="#2f8f63">certain / provenance</text>
  <rect x="206" y="86" width="160" height="22" rx="4" class="judgefill" stroke="#c08a2c"/><text x="216" y="101" class="tag" fill="#c08a2c">scope threshold</text>
  <rect x="378" y="86" width="120" height="22" rx="4" class="humanfill" stroke="#7a5cc0"/><text x="388" y="101" class="tag" fill="#7a5cc0">human / utility</text>

  <!-- 1 receive -->
  <rect x="380" y="128" width="320" height="62" rx="8" class="box term" fill="#eef1f4"/>
  <text x="400" y="153" class="bt">Receive commits (gossip or dial-home)</text>
  <text x="400" y="174" class="bd">Source doesn't matter — a forged one won't verify.</text>

  <!-- 2 verify -->
  <rect x="380" y="222" width="320" height="74" rx="8" class="box certain certfill"/>
  <text x="400" y="247" class="bt">Verify each commit vs group state</text>
  <text x="400" y="267" class="bd">Signatures + binding to prior epoch. Apply</text>
  <text x="400" y="283" class="bd">FORWARD ONLY. Invalid → drop (no human).</text>
  <text x="712" y="262" class="lbl">fails →</text>
  <rect x="772" y="232" width="250" height="54" rx="8" class="box term termfill"/>
  <text x="788" y="255" class="bt" font-size="12.5">Discard, log attributable</text>
  <text x="788" y="274" class="bd">Boring case. Validity-failure ≠ escalation.</text>

  <!-- 3 composable? -->
  <rect x="380" y="330" width="320" height="74" rx="8" class="box judge judgefill"/>
  <text x="400" y="355" class="bt">Concurrent with another valid op?</text>
  <text x="400" y="375" class="bd">Test causal concurrency — neither in the</text>
  <text x="400" y="391" class="bd">other's history. Sequential → not the residue.</text>
  <text x="120" y="360" class="lbl">no / composable</text>
  <rect x="58" y="338" width="270" height="58" rx="8" class="box certain certfill"/>
  <text x="74" y="361" class="bt" font-size="12.5">Incorporate by the fold</text>
  <text x="74" y="380" class="bd">Monotonic merge. No clock, no human.</text>

  <!-- 4 mutually exclusive over standing? -->
  <rect x="380" y="438" width="320" height="78" rx="8" class="box judge judgefill"/>
  <text x="400" y="463" class="bt">Mutually exclusive over standing?</text>
  <text x="400" y="483" class="bd">Both valid, both met threshold, can't both</text>
  <text x="400" y="499" class="bd">hold (A⊖B while B⊖A at equal standing).</text>

  <!-- 5 dispute vs artifact -->
  <rect x="380" y="550" width="320" height="78" rx="8" class="box judge judgefill"/>
  <text x="400" y="575" class="bt">Real dispute, or benign sync artifact?</text>
  <text x="400" y="595" class="bd">Per-scope tolerance over provenance signals.</text>
  <text x="400" y="611" class="bd">Not a constant — guards against alarm fatigue.</text>
  <text x="120" y="580" class="lbl">artifact / partial view</text>
  <rect x="58" y="558" width="270" height="62" rx="8" class="box certain certfill"/>
  <text x="74" y="581" class="bt" font-size="12.5">Hold stale-but-honest view</text>
  <text x="74" y="600" class="bd">Wait for corroboration. Under-authorize,</text>
  <text x="74" y="615" class="bd">never mis-authorize. Re-check on new commit.</text>

  <!-- 6 escalate -->
  <rect x="360" y="662" width="360" height="72" rx="8" class="box human humanfill"/>
  <text x="380" y="687" class="bt">Surface to humans with full provenance</text>
  <text x="380" y="707" class="bd">Machine annotates, does not decide (label-not-</text>
  <text x="380" y="723" class="bd">enforce). The value is constituted, not looked up.</text>

  <!-- 7 outcomes -->
  <rect x="150" y="784" width="340" height="74" rx="8" class="box term termfill"/>
  <text x="170" y="809" class="bt">Humans agree</text>
  <text x="170" y="829" class="bd">One operation accepted by their judgment.</text>
  <text x="170" y="845" class="bd">Scope continues as one.</text>

  <rect x="590" y="784" width="340" height="74" rx="8" class="box human humanfill"/>
  <text x="610" y="809" class="bt">Humans irreducibly disagree → FORK</text>
  <text x="610" y="829" class="bd">Clean split, provenance preserved to point of</text>
  <text x="610" y="845" class="bd">departure. Two communities, no false winner.</text>

  <!-- flows -->
  <path d="M540 190 V222" class="flow" marker-end="url(#a)"/>
  <path d="M540 296 V330" class="flow" marker-end="url(#a)"/>
  <path d="M700 259 H772" class="flow" marker-end="url(#a)"/>
  <path d="M380 367 H328" class="flow" marker-end="url(#a)"/>
  <path d="M540 404 V438" class="flow" marker-end="url(#a)"/>
  <text x="548" y="428" class="lbl">yes, concurrent</text>
  <path d="M540 516 V550" class="flow" marker-end="url(#a)"/>
  <text x="548" y="540" class="lbl">yes</text>
  <path d="M380 589 H328" class="flow" marker-end="url(#a)"/>
  <path d="M540 628 V662" class="flow" marker-end="url(#a)"/>
  <text x="548" y="652" class="lbl">real dispute</text>
  <path d="M460 734 L360 784" class="flow" marker-end="url(#a)"/>
  <path d="M620 734 L740 784" class="flow" marker-end="url(#a)"/>
</svg>
