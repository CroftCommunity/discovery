[package]
name = "public-private-split"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"

[dependencies]
# --- private encrypted stack (carried) ---
automerge = "0.7"
openmls = "0.8"
openmls_rust_crypto = "0.5"
openmls_traits = "0.5"
openmls_basic_credential = "0.5"
chacha20poly1305 = "0.10"
rand = "0.8"
blake3 = "1"

# --- records, lexicons, JSON ---
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"

# --- real atproto CIDs for public records (DAG-CBOR/SHA-256) ---
cid = "0.11"
serde_ipld_dagcbor = "0.6"
multihash-codetable = { version = "0.2", features = ["sha2"] }
