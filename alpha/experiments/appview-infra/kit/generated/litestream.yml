# GENERATED by scripts/render.sh — do not hand-edit.
# Credentials come from the environment (LITESTREAM_ACCESS_KEY_ID /
# LITESTREAM_SECRET_ACCESS_KEY); never stored here (guardrail 4).
# One bucket, per-service prefix (<service>/<db>) — see docs/BUCKETS.md.
dbs:
  - path: /var/lib/croft-groups/state.db
    replicas:
      - type: s3
        endpoint: ${LITESTREAM_ENDPOINT}
        bucket: croft-appview-staging
        path: croft-groups/state
        sync-interval: 1s
        snapshot-interval: 24h
        retention: 168h
  - path: /var/lib/stellin-appview/state.db
    replicas:
      - type: s3
        endpoint: ${LITESTREAM_ENDPOINT}
        bucket: croft-appview-staging
        path: stellin-appview/state
        sync-interval: 1s
        snapshot-interval: 24h
        retention: 168h
