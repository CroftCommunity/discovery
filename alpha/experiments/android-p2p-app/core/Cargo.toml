[package]
name = "group-core"
version = "0.1.0"
edition = "2024"
publish = false
description = "Standalone experiment: Rust iroh + Automerge core for a basic private-group read/post app, bridged to Android via a JSON-RPC-over-FFI surface (UniFFI)."

[lib]
name = "group_core"
# `lib`     -> rlib, used by the host integration tests
# `cdylib`  -> the .so loaded by Android / introspected by uniffi-bindgen
crate-type = ["lib", "cdylib"]

# Delta-Chat-style: a single string-in / string-out FFI surface. We ship a tiny
# `uniffi-bindgen` binary so Kotlin bindings can be generated from the built library.
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[dependencies]
anyhow = "1.0.102"
automerge = "0.6.1"
iroh = "0.98.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "sync", "time"] }
uniffi = { version = "0.29", features = ["cli"] }
data-encoding = "2.2"
rand = "0.10"

[dev-dependencies]
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "sync", "time"] }
