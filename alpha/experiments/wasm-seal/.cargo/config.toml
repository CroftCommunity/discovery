# RUN-19: run wasm32 test binaries under the wasm-bindgen test runner.
# The runner executes the module in Node by default (no
# `wasm_bindgen_test_configure!(run_in_browser)` in the tests) — the
# SPEC-DELTA[run19-node-runner] host stand-in: same module a browser page
# would load, different JS host. Guardrail 4's one headless-chrome attempt
# is made via wasm-pack, not this runner.
[target.wasm32-unknown-unknown]
runner = "wasm-bindgen-test-runner"
