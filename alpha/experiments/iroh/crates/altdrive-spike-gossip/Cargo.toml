[package]
name = "altdrive-spike-gossip"
description = "Throwaway spike (Phase 0, B-gossip) — iroh-gossip 3-node mesh: transitive delivery + drop-a-node resilience, one node per host"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[dependencies]
iroh = "1.0.0-rc.1"
iroh-gossip = "0.100"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "signal"] }
anyhow = "1"
serde_json = "1"
n0-future = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
