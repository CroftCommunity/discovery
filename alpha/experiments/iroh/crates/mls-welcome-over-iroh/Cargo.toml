# Workstream C part 2 — MLS key-distribution over the wire. Standalone spike: carries a REAL openmls
# Welcome over iroh so a joiner gets the group keys over the transport (not modeled as agreed state).
[workspace]
[package]
name = "mls-welcome-over-iroh"
version = "0.0.1"
edition = "2021"
publish = false
[dependencies]
lineage-mls = { path = "../../../../Proofs/lineage-groups/crates/lineage-mls" }
lineage-core = { path = "../../../../Proofs/lineage-groups/crates/lineage-core" }
iroh = { version = "=1.0.0", features = ["test-utils"] }
iroh-relay = { version = "=1.0.0", features = ["server", "test-utils"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "time", "sync"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
