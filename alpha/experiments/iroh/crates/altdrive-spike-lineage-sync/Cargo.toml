[package]
name = "altdrive-spike-lineage-sync"
description = "Throwaway spike (T2g/MD-G2) — carry a chain-hashed lineage branch over a per-lineage iroh-gossip topic; receiver verifies + absorbs distinct branches. Transport form of the green-real lineage-history backfill (Proofs E2.12)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[dependencies]
iroh = "1.0.0-rc.1"
iroh-gossip = "0.100"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "signal"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
n0-future = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
