# Standalone workspace: this spike path-deps the REAL Proofs crates (lineage-core,
# lineage-history) which pin stable ed25519-dalek =2.2.0 / sha2 =0.10.9, alongside
# iroh 1.0.0-rc.1 (which carries ed25519-dalek 3.0.0-pre / sha2 0.11 / two
# curve25519 majors). Cargo permits multiple major versions in one tree and no
# crypto type crosses the iroh<->lineage boundary, so the two resolve side by side.
# Its own Cargo.lock = its own SHA pin, leaving the rc.1 workspace untouched.
[workspace]

[package]
name = "altdrive-spike-faithful-sync"
description = "Faithful end-to-end spike: carry the REAL Ed25519-signed lineage-history::Message over live iroh and verify signature + standing/authority on receipt via the real backfill_import. Closes the transport honesty boundary the hash-chain spikes carried."
version = "0.0.1"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["Chase Pettet <chase@owasp.org>"]
publish = false

[dependencies]
iroh = "1.0.0-rc.1"
iroh-gossip = "0.100"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "signal"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
n0-future = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# The real product crypto + history + authority logic, by path (NOT re-implemented).
lineage-core = { path = "../../../../Proofs/lineage-groups/crates/lineage-core" }
lineage-history = { path = "../../../../Proofs/lineage-groups/crates/lineage-history" }
