[package]
name = "altdrive-spike-irohdocs"
description = "Throwaway spike (Phase 0, Spike 1) — iroh-docs manifest sync, two same-process nodes, scale + LWW conflict semantics"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[dependencies]
iroh = "1.0.0-rc.1"
iroh-docs = "0.100"
iroh-blobs = "0.102"
iroh-gossip = "0.100"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "signal", "time"] }
anyhow = "1"
bytes = "1"
n0-future = "0.3"
